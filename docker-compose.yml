# ═══════════════════════════════════════════════════════════════════
#  Homelab Dashboard — Docker Compose
# ═══════════════════════════════════════════════════════════════════
#  Start alle services voor lokale ontwikkeling en testing.
#
#  Gebruik:
#    docker compose up -d               # Start alles
#    docker compose up -d agent-umbrelos  # Start alleen een agent
#    docker compose logs -f             # Bekijk logs
#
#  Let op: In productie draait elke server-agent op zijn eigen
#  machine. Deze compose is alleen voor lokale ontwikkeling!
# ═══════════════════════════════════════════════════════════════════

services:
  # ─── Server-agent: UmbrelOS ────────────────────────────────────
  agent-umbrelos:
    build:
      context: ./server-agent
      dockerfile: Dockerfile
    container_name: homelab-agent-umbrelos
    ports:
      - "9100:9100"
    env_file:
      - ./server-agent/.env
    environment:
      - AGENT_HOST=0.0.0.0
      - AGENT_PORT=9100
    volumes:
      # Docker socket voor container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Host proc voor hostname/OS detectie (read-only)
      - /proc:/host/proc:ro
      # Host bestandssysteem voor storage info (read-only)
      - /:/host:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Server-agent: Ubuntu ──────────────────────────────────────
  agent-ubuntu:
    build:
      context: ./server-agent
      dockerfile: Dockerfile
    container_name: homelab-agent-ubuntu
    ports:
      - "9101:9100"
    env_file:
      - ./server-agent/.env
    environment:
      - AGENT_HOST=0.0.0.0
      - AGENT_PORT=9100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /:/host:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      # Ubuntu agent start niet standaard mee (tenzij expliciet)
      - production

  # ─── Centraal Dashboard ────────────────────────────────────────
  dashboard:
    build:
      context: ./central-dashboard
      dockerfile: Dockerfile
    container_name: homelab-dashboard
    ports:
      - "8000:8000"
    env_file:
      - ./central-dashboard/.env
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8000
    depends_on:
      agent-umbrelos:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

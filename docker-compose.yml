services:
  # ─── Central Dashboard ──────────────────────────────────────────
  dashboard:
    image: ghcr.io/yero213/homelab-dashboard:latest
    container_name: homelab-dashboard
    ports:
      - "8000:8000"
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8000
      - AGENT_UMBRELOS_URL=http://192.168.1.217:9100
      - AGENT_UBUNTU_URL=http://192.168.1.3:9100
      - DASHBOARD_API_KEY=dashboard-dev-key
    restart: unless-stopped
    networks:
      - homelab-net

networks:
  homelab-net:
    driver: bridge

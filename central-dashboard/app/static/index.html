<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Homelab Dashboard — centraal beheer van servers en containers">
  <title>Homelab Dashboard</title>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Favicon (data-uri zwart vierkant) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23000'/></svg>">
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>Homelab Dashboard</h1>
      <div class="header-meta">
        <div class="last-updated">
          Laatste update: <span id="last-updated">—</span>
        </div>
        <div class="server-count" id="server-count">laden…</div>
      </div>
    </header>

    <!-- Dashboard container — wordt gevuld door JS -->
    <main id="dashboard-container"></main>

    <!-- Toast notificaties -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <!-- Configuratie (dynamisch gegenereerd door backend) -->
  <script src="/static/js/config.js"></script>

  <!-- Applicatie -->
  <script src="/static/js/app.js"></script>

</body>
</html>

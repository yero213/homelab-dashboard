# ═══════════════════════════════════════════════════════════════════
#  Homelab Agent — Docker Compose voor UmbrelOS / ZimaOS
#
#  Gebruik:
#    docker compose -f docker-compose.agent.yml up -d
#
#  De volume mounts zorgen ervoor dat de agent toegang krijgt tot
#  de host-filesystem voor correcte hostname, storage en OS-detectie.
# ═══════════════════════════════════════════════════════════════════

services:
  homelab-agent:
    image: ghcr.io/yero213/homelab-agent:latest
    container_name: homelab-agent
    ports:
      - "9100:9100"
    environment:
      - AGENT_API_KEY=dev-agent-key
      - AGENT_PORT=9100
    volumes:
      # Host filesystem (read-only) — nodig voor hostname, storage en OS-detectie
      - /:/host:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
